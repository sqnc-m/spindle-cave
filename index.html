<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Spindle Trail Run @Roundhill 2026 — Invitation Closed</title>
<meta property="og:title" content="Spindle Trail Run @Roundhill 2026">
<meta property="og:description" content="초대 신청이 마감되었습니다">
<meta property="og:image" content="hero.jpg">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<style>
:root {
  --bg-dark: #000000;
  --text-on-dark: #ffffff;
  --text-on-dark-muted: rgba(255, 255, 255, 0.55);
  --border-dark-soft: rgba(255, 255, 255, 0.12);
  --font-sans: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-dark);
  color: var(--text-on-dark);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  word-break: keep-all;
  overflow-wrap: break-word;
  letter-spacing: -0.01em;
  height: 100%;
  overflow: hidden;
}

.closed-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 28px 24px 40px;
  background: var(--bg-dark);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.logo {
  height: 32px;
  width: auto;
  opacity: 0.95;
}

.badge {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-on-dark-muted);
  text-transform: uppercase;
  padding: 6px 10px;
  border: 1px solid var(--border-dark-soft);
  border-radius: 999px;
}

.center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 0;
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--text-on-dark-muted);
  text-transform: uppercase;
  margin-bottom: 24px;
}

.title {
  font-size: 38px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1.25;
  margin: 0;
}

.bottom {
  text-align: center;
}

.event-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--text-on-dark-muted);
  text-transform: uppercase;
}

@media (min-width: 768px) {
  .title {
    font-size: 56px;
  }
  .logo {
    height: 40px;
  }
}
</style>
</head>
<body>

<div class="closed-screen">
  <div class="top">
    <img src="logo.png" alt="Spindle Trail Run" class="logo">
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
      <span style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:rgba(255,255,255,0.5);text-transform:uppercase;font-weight:500;">CAVEWORKS</span>
      <span class="badge">Closed</span>
    </div>
  </div>

  <div class="center">
    <div class="eyebrow">Invitation</div>
    <h1 class="title">초대 신청이<br>마감되었습니다</h1>
  </div>

  <div class="bottom">
    <div class="event-meta">Spindle Trail Run · Roundhill 2026</div>
  </div>
</div>

</body>
</html>
